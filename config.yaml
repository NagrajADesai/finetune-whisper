# Whisper Finetuning Configuration

model:
  name: "openai/whisper-small"

dataset:
  name: "MatrixSpeechAI/All_Marathi_ASR"
  language: "Marathi"
  task: "transcribe"
  max_duration_in_seconds: 30.0
  sampling_rate: 16000

training:
  output_dir: "./whisper-small-marathi"
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 1e-5
  warmup_steps: 100
  max_steps: 1000
  gradient_checkpointing: true
  bf16: true
  generation_max_length: 225
  save_steps: 250
  eval_steps: 250
  logging_steps: 25
